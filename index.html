<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnautica 2 - Deep Dive Countdown</title>
    <link rel="icon" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');

        :root {
            --primary-blue: #00f2fe;
            --deep-blue: #00192d;
            --accent-cyan: #4facfe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            overflow-x: hidden;
            overflow-y: auto;
            color: #fff;
        }

        /* Исправленный оверлей: мягкое затемнение сверху и снизу */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.9) 0%, 
                rgba(0,0,0,0.3) 25%, 
                rgba(0,0,0,0.3) 75%, 
                rgba(0,0,0,0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        #bg-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s;
            /* Начальный масштаб чуть больше, чтобы параллакс не оголял края */
            transform: scale(1.1); 
        }

        .bg-image.active { opacity: 1; }

        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .lang-switch button {
            background: rgba(0, 25, 45, 0.6);
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .lang-switch button:hover {
            background: var(--primary-blue);
            color: #000;
            box-shadow: 0 0 15px var(--primary-blue);
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .logo-wrapper img {
            max-width: 500px;
            width: 100%;
            margin-bottom: 40px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float { 50% { transform: translateY(-15px); } }

        .countdown-wrapper {
            background: rgba(0,20,35,0.4);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        .countdown-title {
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .timer {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box span {
            font-size: 4rem;
            font-weight: 900;
            display: block;
            line-height: 1;
        }

        .time-box div {
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 10px;
            color: var(--accent-cyan);
        }

        .calendar-btn {
            margin-top: 35px;
            padding: 15px 35px;
            border-radius: 40px;
            border: 1px solid var(--primary-blue);
            background: transparent;
            color: var(--primary-blue);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .calendar-btn:hover {
            background: rgba(0,242,254,0.2);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }

        .trailer-section {
            margin-top: 80px;
            width: 100%;
            max-width: 900px;
            padding-bottom: 50px;
        }

        .trailer-wrapper {
            position: relative;
            padding-top: 56.25%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .trailer-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div id="bg-container"></div>
<div class="overlay"></div>

<div class="lang-switch">
    <button onclick="setLanguage('ru')">RU</button>
    <button onclick="setLanguage('en')">EN</button>
</div>

<div class="content">
    <div class="logo-wrapper">
        <img src="img/logo.png" alt="Subnautica 2">
    </div>

    <div class="countdown-wrapper">
        <div class="countdown-title" id="t-title">Экспедиция начнется через</div>
        <div class="timer">
            <div class="time-box"><span id="days">00</span><div id="l-days">Дней</div></div>
            <div class="time-box"><span id="hours">00</span><div id="l-hours">Часов</div></div>
            <div class="time-box"><span id="minutes">00</span><div id="l-minutes">Минут</div></div>
            <div class="time-box"><span id="seconds">00</span><div id="l-seconds">Секунд</div></div>
        </div>
        <button class="calendar-btn" id="t-btn" onclick="addToCalendar()">Добавить в календарь</button>
    </div>

    <div class="trailer-section">
        <div class="trailer-wrapper">
            <iframe src="https://www.youtube.com/embed/8EZhCzFaQuw" allowfullscreen></iframe>
        </div>
    </div>
</div>

<audio id="sound" loop>
    <source src="img/subnautica_01. Salutations" type="audio/mpeg">
</audio>

<script>
    const translations = {
        ru: {
            title: "Экспедиция начнется через",
            days: "Дней", hours: "Часов", minutes: "Минут", seconds: "Секунд",
            btn: "Добавить в календарь"
        },
        en: {
            title: "Expedition starts in",
            days: "Days", hours: "Hours", minutes: "Minutes", seconds: "Seconds",
            btn: "Add to Calendar"
        }
    };

    function setLanguage(lang) {
        const t = translations[lang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-btn').innerText = t.btn;
        document.getElementById('l-days').innerText = t.days;
        document.getElementById('l-hours').innerText = t.hours;
        document.getElementById('l-minutes').innerText = t.minutes;
        document.getElementById('l-seconds').innerText = t.seconds;
        localStorage.setItem('subnautica_lang', lang);
    }

    // Таймер
    const targetDate = new Date('2026-05-14T15:00:00Z').getTime();
    function updateTimer() {
        const d = targetDate - Date.now();
        if (d < 0) return;
        document.getElementById('days').innerText = Math.floor(d / 86400000);
        document.getElementById('hours').innerText = Math.floor(d / 3600000) % 24;
        document.getElementById('minutes').innerText = Math.floor(d / 60000) % 60;
        document.getElementById('seconds').innerText = Math.floor(d / 1000) % 60;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    function addToCalendar() {
        window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=Subnautica+2&dates=20260514T150000Z/20260514T170000Z");
    }

    // Фоновые изображения
    const bgImages = ['img/bg1.jpg', 'img/bg2.jpg'];
    let currentImg = 0;
    const container = document.getElementById('bg-container');

    bgImages.forEach((src, idx) => {
        const d = document.createElement('div');
        d.className = 'bg-image';
        d.style.backgroundImage = `url(${src})`;
        if (idx === 0) d.classList.add('active');
        container.appendChild(d);
    });

    setInterval(() => {
        const imgs = document.querySelectorAll('.bg-image');
        imgs[currentImg].classList.remove('active');
        currentImg = (currentImg + 1) % imgs.length;
        imgs[currentImg].classList.add('active');
    }, 8000);

    // Параллакс
    document.addEventListener('mousemove', e => {
        const x = (e.clientX / window.innerWidth - 0.5) * 15;
        const y = (e.clientY / window.innerHeight - 0.5) * 15;
        document.querySelectorAll('.bg-image').forEach(el => {
            el.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
    });

    // Звук
    document.addEventListener('click', () => {
        const s = document.getElementById('sound');
        s.volume = 0.3;
        s.play().catch(()=>{});
    }, { once: true });

    // Инициализация языка
    setLanguage(localStorage.getItem('subnautica_lang') || 'ru');
</script>

</body>
</html>
